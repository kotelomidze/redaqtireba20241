      // --- COMPONENT RENDERERS ---

      function renderProgressBar() {
        const current = state.currentIndex + 1;
        const total = EXERCISE_DATA.length;
        const percentage = Math.min(100, Math.max(0, ((current) / total) * 100));
        return `
          <div class="w-full bg-slate-200 rounded-full h-2.5 mb-6">

              style="width: ${percentage}%"
            ></div>
            <div class="text-xs text-slate-500 mt-1 text-right">
              ${current} / ${total}
            </div>
          </div>
        `;
      }

      function renderDiffViewer(input, correct) {
        // Split strings into arrays of words
        const arrInput = input.trim().split(/\s+/);
        const arrCorrect = correct.trim().split(/\s+/);
        
        const n = arrInput.length;
        const m = arrCorrect.length;

        // --- Longest Common Subsequence (LCS) Algorithm ---
        
        // dp[i][j] stores the length of LCS for arrInput[0..i-1] and arrCorrect[0..j-1]
        // Initialize (n+1) x (m+1) matrix with zeros
        const dp = [];
        for (let i = 0; i <= n; i++) {
          dp[i] = new Array(m + 1).fill(0);
        }

        // Fill DP table
        for (let i = 1; i <= n; i++) {
          for (let j = 1; j <= m; j++) {
            if (arrInput[i - 1] === arrCorrect[j - 1]) {
              dp[i][j] = dp[i - 1][j - 1] + 1;
            } else {
              dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
            }
          }
        }

        // Backtrack to find which indices in the Correct Version are part of the LCS
        let i = n;
        let j = m;
        const correctIndicesInLCS = new Set();

        while (i > 0 && j > 0) {
          if (arrInput[i - 1] === arrCorrect[j - 1]) {
            // Match found. Record index (j-1) from Correct array.
            correctIndicesInLCS.add(j - 1);
            i--;
            j--;
          } else if (dp[i - 1][j] > dp[i][j - 1]) {
            i--;
          } else {
            j--;
          }
        }

        // --- Render ---
        
        const html = arrCorrect.map((word, index) => {
          // If the word exists in the LCS (isMatch is true), it means the user has it too -> Neutral color.
          // If it is NOT in LCS, it means the user is missing it or has something else -> Green highlight.
          const isMatch = correctIndicesInLCS.has(index);
          const className = !isMatch ? "text-green-600 font-bold bg-green-50 px-1 rounded" : "text-slate-800";
          return `<span class="${className}">${word} </span>`;
        }).join('');

        return `
          <div class="mt-4 p-4 bg-white rounded-lg border border-slate-200 shadow-sm">
            <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-2">სწორი ვერსია:</h3>
            <p class="text-lg leading-relaxed">${html}</p>
          </div>
        `;
      }

        const errorIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mt-0.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>`;

        root.innerHTML = `

                </div>

              ${renderProgressBar()}

              <div class="bg-white rounded-xl shadow-lg border transition-colors duration-300 overflow-hidden ${cardBorderClass}">
                
                <div class="p-6 sm:p-8">
                  <label for="editor" class="block text-sm font-medium text-slate-700 mb-2">
                    დაარედაქტირეთ წინადადება:
                  </label>
                  <textarea
                    id="editor"
                    rows="4"
                    class="w-full p-4 text-lg rounded-lg border focus:ring-2 focus:outline-none transition-all resize-none ${textareaClass}"
                    ${state.status !== 'IDLE' ? 'disabled' : ''}
                  >${state.userInput}</textarea>

                  ${isIncorrect ? `
                    <div class="mt-4 flex items-start space-x-2 text-red-600 animate-pulse">
                      ${errorIcon}

                    </div>
                    ${renderDiffViewer(state.userInput, currentSentence.corrected)}
                  ` : ''}
                  
                  ${isCorrect ? `

                </div>

                <div class="bg-slate-50 px-6 py-4 flex justify-between items-center border-t border-slate-200">
                   <div class="text-sm text-slate-500">
                     ${state.currentIndex + 1} / ${EXERCISE_DATA.length}

                     ${state.status === 'IDLE' ? `
                       <button

        if (textarea) {
            textarea.addEventListener('input', (e) => {
                state.userInput = e.target.value;
                if (state.status !== 'IDLE') {
                    state.status = 'IDLE';
                    const cursorPosition = textarea.selectionStart;
                    render();
                    const newTextarea = document.getElementById('editor');
                    if (newTextarea) {
                        newTextarea.focus();
                        newTextarea.setSelectionRange(cursorPosition, cursorPosition);
                    }
                }
            });
            
            if (state.status === 'IDLE' && state.userInput === EXERCISE_DATA[state.currentIndex].original && !isCorrect) {
                 textarea.focus();
            }
        }
      }

      // --- HANDLERS ---
      
      window.handleNameInput = function(value) {
        state.userName = value;
        // Re-render to update button state
        const btn = document.querySelector('button');
        if (btn) {
           if (value.trim()) {
             btn.disabled = false;
             btn.classList.remove('opacity-50', 'cursor-not-allowed');
           } else {
             btn.disabled = true;
             btn.classList.add('opacity-50', 'cursor-not-allowed');
           }
        }
      };

      window.handleStart = function() {
        if (!state.userName.trim()) return;
        state.isStarted = true;
        render();
      };

      window.handleCheck = function() {
        if (state.status !== 'IDLE') return;

        const currentSentence = EXERCISE_DATA[state.currentIndex];
        const normalizedInput = state.userInput.trim();
        const normalizedCorrect = currentSentence.corrected.trim();

        if (normalizedInput === normalizedCorrect) {
          state.status = 'CORRECT';
        } else {
          state.status = 'INCORRECT';
        }
        render();
      };

      window.handleNext = function() {
        // Record result
        const currentData = EXERCISE_DATA[state.currentIndex];
        state.results.push({
          id: currentData.id,
          original: currentData.original,
          corrected: currentData.corrected,
          userInput: state.userInput,
          isCorrect: state.status === 'CORRECT'
        });

        if (state.currentIndex < EXERCISE_DATA.length - 1) {
          state.currentIndex++;
          state.userInput = EXERCISE_DATA[state.currentIndex].original;
          state.status = 'IDLE';
          render();
        } else {
          state.isFinished = true;
          render();
        }
      };

      window.handleRetry = function() {
        state.status = 'IDLE';
        render();
      };

      window.handleRestart = function() {
        // Keep userName and isStarted, reset game state
        state.currentIndex = 0;
        state.userInput = EXERCISE_DATA[0].original;
        state.status = 'IDLE';
        state.isFinished = false;
        state.results = [];
        render();
      };

      window.handleCopyReport = function() {
        const date = getFormattedDate();
        const correctCount = state.results.filter(r => r.isCorrect).length;
        const total = EXERCISE_DATA.length;
        const percent = Math.round((correctCount / total) * 100);

        let report = `რედაქტირების სავარჯიშო\n`;
        report += `მოსწავლე: ${state.userName}\n`;
        report += `თარიღი: ${date}\n`;
        report += `შედეგი: ${correctCount} / ${total} (${percent}%)\n\n`;
        report += `დეტალური ანგარიში:\n`;
        report += `-------------------\n`;

        state.results.forEach((res, index) => {
           const icon = res.isCorrect ? "✅ სწორია" : "❌ შეცდომაა";
           report += `${index + 1}. ${icon}\n`;
           if (!res.isCorrect) {
             report += `   თქვენი ვერსია: ${res.userInput}\n`;
             report += `   სწორი ვერსია:  ${res.corrected}\n`;
           } else {
             report += `   ${res.corrected}\n`;
           }
           report += `\n`;
        });

        navigator.clipboard.writeText(report).then(() => {
          alert("შედეგები დაკოპირდა!");
        }).catch(err => {
          console.error("Failed to copy: ", err);
          alert("კოპირება ვერ მოხერხდა.");
        });
      };

      // --- INIT ---
      state.userInput = EXERCISE_DATA[0].original;
      render();

    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
