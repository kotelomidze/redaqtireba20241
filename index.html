  <head>

  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",

</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root"></div>
    <script type="module">
      
      // --- DATA ---
      const EXERCISE_DATA = [
        {
          id: 1,
          original: "ფეხბურთი სპორტის ყველაზე პოპულარული სახეობაა მსოფლიოში.",
          corrected: "ფეხბურთი სპორტის ყველაზე პოპულარული სახეობაა მსოფლიოში.",
          hasErrors: false
        },
        {
          id: 2,
          original: "ეს თამაში XIX საუკუნეში შეიქმნა ინგლისში.",
          corrected: "ეს თამაში XIX საუკუნეში შეიქმნა ინგლისში.",
          hasErrors: false
        },
        {
          id: 3,
          original: "ინგლისელებმა შემოიტანეს ის საქართველოშიც.",
          corrected: "ინგლისელებმა შემოიტანეს ის საქართველოშიც.",
          hasErrors: false
        },
        {
          id: 4,
          original: "ფოთისა და ბათუმის მოსახლეობა ხშირად ხედავდნენ თუ როგორ თამაშობდნენ „ფუტბოლს“ ბრიტანულ გემების მეზღვაურები.",
          corrected: "ფოთისა და ბათუმის მოსახლეობა ხშირად ხედავდა, თუ როგორ თამაშობდნენ „ფუტბოლს“ ბრიტანული გემების მეზღვაურები.",
          hasErrors: true
        },
        {
          id: 5,
          original: "სპორტის ეს სახეობა სულ მალე ქართველებმაც შეიყვარეს.",
          corrected: "სპორტის ეს სახეობა სულ მალე ქართველებმაც შეიყვარეს.",
          hasErrors: false
        },
        {
          id: 6,
          original: "ფეხბურთი ქართულ პრესაში პირველათ 1890 წელს არის ნახსენები.",
          corrected: "ფეხბურთი ქართულ პრესაში პირველად 1890 წელს არის ნახსენები.",
          hasErrors: true
        },
        {
          id: 7,
          original: "საქართველოს ზღვის პირა ქალაქების შემდეგ ფეხბურთი თბილისშიც შემოვიდა.",
          corrected: "საქართველოს ზღვისპირა ქალაქების შემდეგ ფეხბურთი თბილისშიც შემოვიდა.",
          hasErrors: true
        },
        {
          id: 8,
          original: "ამავე პერიოდში ინგლისურიდან თამაშის წესები ითარგმნა.",
          corrected: "ამავე პერიოდში ინგლისურიდან თამაშის წესები ითარგმნა.",
          hasErrors: false
        },
        {
          id: 9,
          original: "1906 წელს ჩამოყალიბდა ფეხბურთის მოყვარულთა წრე რომელსაც ვარჯიშისათვის სათანადო გარემო ჭირდებოდა.",
          corrected: "1906 წელს ჩამოყალიბდა ფეხბურთის მოყვარულთა წრე, რომელსაც ვარჯიშისათვის სათანადო გარემო სჭირდებოდა.",
          hasErrors: true
        },
        {
          id: 10,
          original: "გადაწყდა რომ საფეხბურთო მოედანისათვის შესაფერისი ადგილი დიდუბის იპოდრომზე გამოეყოთ.",
          corrected: "გადაწყდა, რომ საფეხბურთო მოედნისათვის შესაფერისი ადგილი დიდუბის იპოდრომზე გამოეყოთ.",
          hasErrors: true
        },
        {
          id: 11,
          original: "პირველი ოფიციალური შეხვედრა 1911 წელს გაიმართა.",
          corrected: "პირველი ოფიციალური შეხვედრა 1911 წელს გაიმართა.",
          hasErrors: false
        },
        {
          id: 12,
          original: "ერთი წლის შემდეგ ჩატარდა ქალაქის ჩემპიონატი რომელშიც გამარჯვება მოიხვეჭა ვაჟთა II გიმნაზიის გუნდმა.",
          corrected: "ერთი წლის შემდეგ ჩატარდა ქალაქის ჩემპიონატი, რომელშიც გამარჯვება მოიპოვა ვაჟთა II გიმნაზიის გუნდმა.",
          hasErrors: true
        },
        {
          id: 13,
          original: "1923 წელს ერთმანეთს უკვე 27 გუნდი ეჯიბრებოდა.",
          corrected: "1923 წელს ერთმანეთს უკვე 27 გუნდი ეჯიბრებოდა.",
          hasErrors: false
        },
        {
          id: 14,
          original: "1925 წელს შეიქმნა საფეხბურთო გუნდი „დინამო“ რის სახელთანაც არის დაკავშირებული ქართული ფეხბურთის არაერთი მნიშვნელოვანი წარმატება.",
          corrected: "1925 წელს შეიქმნა საფეხბურთო გუნდი „დინამო“, რომლის სახელთანაც არის დაკავშირებული ქართული ფეხბურთის არაერთი მნიშვნელოვანი წარმატება.",
          hasErrors: true
        },
        {
          id: 15,
          original: "1990 წლის 15 თებერვალს დაარსდა საქართველოს ფეხბურთის ფედერაცია რომელმაც იმავე წელს უხელმძღვანელა საქართველოს პირველ დამოუკიდებელ ჩემპიონატსა და თასის გათამაშებას.",
          corrected: "1990 წლის 15 თებერვალს დაარსდა საქართველოს ფეხბურთის ფედერაცია, რომელმაც იმავე წელს უხელმძღვანელა საქართველოს პირველ დამოუკიდებელ ჩემპიონატსა და თასის გათამაშებას.",
          hasErrors: true
        }
      ];

      // --- STATE ---
      const state = {
        currentIndex: 0,
        userInput: "",
        status: "IDLE", // IDLE, CORRECT, INCORRECT
        isFinished: false
      };

      // --- COMPONENT RENDERERS ---

      function renderProgressBar() {
        const current = state.currentIndex + 1;
        const total = EXERCISE_DATA.length;
        const percentage = Math.min(100, Math.max(0, ((current) / total) * 100));
        return `
          <div class="w-full bg-slate-200 rounded-full h-2.5 mb-6">
            <div
              class="bg-indigo-600 h-2.5 rounded-full transition-all duration-500 ease-out"
              style="width: ${percentage}%"
            ></div>
            <div class="text-xs text-slate-500 mt-1 text-right">
              ${current} / ${total}
            </div>
          </div>
        `;
      }

      function renderDiffViewer(input, correct) {
        const inputWords = input.split(' ');
        const correctWords = correct.split(' ');
        
        const html = correctWords.map((word, index) => {
          const inputWord = inputWords[index];
          // Simple exact match check.
          // Note: trimming might be needed if multiple spaces, but splitting by ' ' usually handles it predictably for this exercise.
          const isMatch = inputWord === word;
          const className = !isMatch ? "text-green-600 font-bold bg-green-50 px-1 rounded" : "text-slate-800";
          return `<span class="${className}">${word} </span>`;
        }).join('');

        return `
          <div class="mt-4 p-4 bg-white rounded-lg border border-slate-200 shadow-sm">
            <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-2">სწორი ვერსია:</h3>
            <p class="text-lg leading-relaxed">${html}</p>
          </div>
        `;
      }

      // --- MAIN RENDER FUNCTION ---
      function render() {
        const root = document.getElementById('root');
        
        if (state.isFinished) {
          root.innerHTML = `
            <div class="min-h-screen flex items-center justify-center bg-slate-50 p-4">
              <div class="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full text-center">
                <div class="mb-6 flex justify-center">
                   <span class="text-6xl">🎉</span>
                </div>
                <h1 class="text-2xl font-bold text-slate-900 mb-4">სავარჯიშო დასრულებულია!</h1>
                <p class="text-slate-600 mb-8">
                  გილოცავთ, თქვენ წარმატებით დაასრულეთ ტექსტის რედაქტირების სავარჯიშო.
                </p>
                <button
                  onclick="window.handleRestart()"
                  class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors"
                >
                  თავიდან დაწყება
                </button>
              </div>
            </div>
          `;
          return;
        }

        const currentSentence = EXERCISE_DATA[state.currentIndex];
        const isCorrect = state.status === 'CORRECT';
        const isIncorrect = state.status === 'INCORRECT';

        // Dynamic Classes
        let cardBorderClass = 'border-slate-200';
        if (isCorrect) cardBorderClass = 'border-green-500 shadow-green-100';
        if (isIncorrect) cardBorderClass = 'border-red-500 shadow-red-100';

        let textareaClass = 'bg-white border-slate-300 text-slate-900 focus:ring-indigo-500 focus:border-indigo-500';
        if (isCorrect) textareaClass = 'bg-green-50 border-green-300 text-green-900 focus:ring-green-500';
        if (isIncorrect) textareaClass = 'bg-red-50 border-red-300 text-red-900 focus:ring-red-500';

        // Icons
        const errorIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mt-0.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>`;
        const successIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mt-0.5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>`;

        root.innerHTML = `
          <div class="min-h-screen bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">
            <div class="max-w-3xl mx-auto">
              
              <div class="mb-8 text-center">
                <h1 class="text-3xl font-extrabold text-slate-900 mb-2">
                  ტექსტის რედაქტირება
                </h1>
                <p class="text-slate-600">
                  ტექსტში შეგხვდებათ მორფოლოგიურ-ორთოგრაფიული, სტილისტური, სინტაქსური და პუნქტუაციური შეცდომები.
                </p>
              </div>

              ${renderProgressBar()}

              <div class="bg-white rounded-xl shadow-lg border transition-colors duration-300 overflow-hidden ${cardBorderClass}">
                
                <div class="p-6 sm:p-8">
                  <label for="editor" class="block text-sm font-medium text-slate-700 mb-2">
                    დაარედაქტირეთ წინადადება:
                  </label>
                  <textarea
                    id="editor"
                    rows="4"
                    class="w-full p-4 text-lg rounded-lg border focus:ring-2 focus:outline-none transition-all resize-none ${textareaClass}"
                    ${isCorrect ? 'disabled' : ''}
                  >${state.userInput}</textarea>

                  ${isIncorrect ? `
                    <div class="mt-4 flex items-start space-x-2 text-red-600 animate-pulse">
                      ${errorIcon}
                      <span class="font-medium">შეცდომაა!</span>
                    </div>
                    ${renderDiffViewer(state.userInput, currentSentence.corrected)}
                  ` : ''}
                  
                  ${isCorrect ? `
                    <div class="mt-4 flex items-start space-x-2 text-green-600">
                      ${successIcon}
                      <span class="font-medium">სწორია!</span>
                    </div>
                  ` : ''}
                </div>

                <div class="bg-slate-50 px-6 py-4 flex justify-between items-center border-t border-slate-200">
                   <div class="text-sm text-slate-500">
                     ${state.currentIndex + 1} / ${EXERCISE_DATA.length}
                   </div>
                   <div>
                     ${state.status === 'IDLE' ? `
                       <button
                         onclick="window.handleCheck()"
                         class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-lg transition-colors shadow-sm"
                       >
                         შემოწმება
                       </button>
                     ` : ''}
                     ${state.status === 'INCORRECT' ? `
                       <div class="space-x-3">
                         <button
                          onclick="window.handleRetry()"
                          class="text-slate-600 hover:text-slate-900 font-medium py-2 px-4 transition-colors"
                         >
                           თავიდან ცდა
                         </button>
                         <button
                           onclick="window.handleNext()"
                           class="bg-slate-800 hover:bg-slate-900 text-white font-medium py-2 px-6 rounded-lg transition-colors shadow-sm"
                         >
                           შემდეგი
                         </button>
                       </div>
                     ` : ''}
                     ${state.status === 'CORRECT' ? `
                       <button
                         onclick="window.handleNext()"
                         class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-6 rounded-lg transition-colors shadow-sm flex items-center"
                       >
                         შემდეგი
                         <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1" viewBox="0 0 20 20" fill="currentColor">
                           <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                         </svg>
                       </button>
                     ` : ''}
                   </div>
                </div>
              </div>
            </div>
          </div>
        `;
        
        // Re-attach listeners after rendering
        const textarea = document.getElementById('editor');
        if (textarea) {
            textarea.addEventListener('input', (e) => {
                state.userInput = e.target.value;
                if (state.status !== 'IDLE') {
                    // Reset to IDLE on edit, but only if not already IDLE to avoid loop
                    state.status = 'IDLE';
                    // Save cursor position before re-render
                    // Note: Since we are re-rendering the whole app, the element is replaced.
                    // We must manually restore focus and simple cursor position.
                    const cursorPosition = textarea.selectionStart;
                    
                    render();
                    
                    // Restore focus and cursor
                    const newTextarea = document.getElementById('editor');
                    if (newTextarea) {
                        newTextarea.focus();
                        newTextarea.setSelectionRange(cursorPosition, cursorPosition);
                    }
                }
            });
            
            // Auto-focus logic: If just transitioned to this slide (IDLE) and empty/original text
            if (state.status === 'IDLE' && state.userInput === EXERCISE_DATA[state.currentIndex].original && !isCorrect) {
                 // Check if we are not actively typing (this handles the initial load case)
                 // We don't want to steal focus if user clicked something else, but here it's fine.
                 textarea.focus();
            }
        }
      }

      // --- HANDLERS ---
      
      window.handleCheck = function() {
        if (state.status !== 'IDLE') return;

        const currentSentence = EXERCISE_DATA[state.currentIndex];
        const normalizedInput = state.userInput.trim();
        const normalizedCorrect = currentSentence.corrected.trim();

        if (normalizedInput === normalizedCorrect) {
          state.status = 'CORRECT';
        } else {
          state.status = 'INCORRECT';
        }
        render();
      };

      window.handleNext = function() {
        if (state.currentIndex < EXERCISE_DATA.length - 1) {
          state.currentIndex++;
          state.userInput = EXERCISE_DATA[state.currentIndex].original;
          state.status = 'IDLE';
          render();
        } else {
          state.isFinished = true;
          render();
        }
      };

      window.handleRetry = function() {
        state.status = 'IDLE';
        render();
      };

      window.handleRestart = function() {
        state.currentIndex = 0;
        state.userInput = EXERCISE_DATA[0].original;
        state.status = 'IDLE';
        state.isFinished = false;
        render();
      };

      // --- INIT ---
      state.userInput = EXERCISE_DATA[0].original;
      render();

    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
